<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - AI Talk</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons for modern, clean icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="ph ph-graduation-cap"></i>
                    <span>ProjectGaurd</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="projects.html" class="nav-item">
                    <i class="ph ph-squares-four"></i>
                    <span>Dashboard</span>
                </a>
                <a href="projects.html" class="nav-item">
                    <i class="ph ph-folder-open"></i>
                    <span>My Projects</span>
                </a>
                <a href="index.html" class="nav-item">
                    <i class="ph ph-upload-simple"></i>
                    <span>Submit Project</span>
                </a>
                <a href="acceptance.html" class="nav-item">
                    <i class="ph ph-check-square"></i>
                    <span>Acceptance testing</span>
                </a>
                <a href="ai-talk.html" class="nav-item active">
                    <i class="ph ph-chat-circle-dots"></i>
                    <span>Ai talk</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="ph ph-gear"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <img src="https://i.pravatar.cc/150?img=68" alt="Student Profile" class="avatar">
                    <div class="user-info">
                        <span class="user-name">Krishna K</span>
                        <span class="user-role">Student</span>
                    </div>
                </div>
                <div class="logout-wrapper" style="margin-top: 1rem; border-top: 1px solid var(--glass-border); padding-top: 1rem;">
                    <a href="auth.html" class="nav-item">
                        <i class="ph ph-sign-out"></i>
                        <span>Logout</span>
                    </a>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div>
                    <h1 class="page-title">AI Talk</h1>
                    <p class="page-subtitle">Chat with our AI Assistant regarding your projects</p>
                </div>
            </header>

            <div class="chat-container">
                <div id="chat-messages" class="chat-messages">
                    <!-- Chat messages will appear here -->
                    <div class="message ai-message">
                        <i class="ph-fill ph-sparkle"></i>
                        <span>Hello! How's it going? What's on your mind today?</span>
                    </div>
                </div>
                
                <div class="chat-input-wrapper">
                    <form id="chat-form" class="chat-form-gemini">
                        <textarea id="chat-input" placeholder="Ask Gemini..." rows="1" required></textarea>
                        <div class="chat-input-actions">
                            <button type="submit" class="gemini-send-btn">
                                <i class="ph-bold ph-caret-right"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    
    <script type="module" src="ai-talk.js"></script>
</body>
</html>
