<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectGaurd - Login & Sign Up</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Auth specific overrides/additions if needed, though most will be in style.css */
        body {
            justify-content: center;
            align-items: center;
            overflow: auto;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card glass-card">
            <div class="auth-header">
                <div class="logo">
                    <i class="ph ph-graduation-cap"></i>
                    <span>ProjectGaurd</span>
                </div>
                <h2 id="auth-title">Welcome Back</h2>
                <p id="auth-subtitle">Please Enter your details to continue</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="login-roll">Username or PRN</label>
                    <div class="input-wrapper">
                        <i class="ph ph-user"></i>
                        <input type="text" id="login-roll" placeholder="Enter Username or PRN" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="login-pass">Password</label>
                    <div class="input-wrapper">
                        <i class="ph ph-lock"></i>
                        <input type="password" id="login-pass" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary auth-btn">
                    <span>Login</span>
                    <i class="ph ph-arrow-right"></i>
                </button>
                <p class="auth-switch">Don't have an account? <a href="#" id="show-signup">Sign Up</a></p>
            </form>

            <!-- Signup Form (Hidden by default) -->
            <form id="signup-form" class="auth-form" style="display: none;">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="roll-1">Roll Number 1</label>
                        <input type="text" id="roll-1" placeholder="Student 1" required>
                    </div>
                    <div class="form-group">
                        <label for="roll-2">Roll Number 2</label>
                        <input type="text" id="roll-2" placeholder="Student 2" required>
                    </div>
                    <div class="form-group">
                        <label for="roll-3">Roll Number 3</label>
                        <input type="text" id="roll-3" placeholder="Student 3" required>
                    </div>
                    <div class="form-group">
                        <label for="roll-4">Roll Number 4</label>
                        <input type="text" id="roll-4" placeholder="Student 4" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-id">Username or PRN</label>
                        <input type="text" id="signup-id" placeholder="Enter Username or PRN" required>
                    </div>
                    <div class="form-group">
                        <label for="year">Year</label>
                        <input type="text" id="year" placeholder="Enter Year" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="mentor-name">Mentor Name</label>
                    <div class="input-wrapper">
                        <i class="ph ph-user-focus"></i>
                        <input type="text" id="mentor-name" placeholder="Enter mentor's name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="signup-pass">Create Password</label>
                    <div class="input-wrapper">
                        <i class="ph ph-lock"></i>
                        <input type="password" id="signup-pass" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary auth-btn">
                    <span>Create Account</span>
                    <i class="ph ph-user-plus"></i>
                </button>
                <p class="auth-switch">Already have an account? <a href="#" id="show-login">Login</a></p>
            </form>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
